<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>好戏再生二维码海报</title>
  <style>
    :root {
      --sky: #9fd6ff;
      --grass: #5d9946;
      --soil: #8c5b32;
      --paper: #f6ecd4;
      --ink: #2c2118;
      --red: #a5382b;
      --gold: #e3b953;
      --wood: #6d4323;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(255, 249, 228, 0.95), rgba(255, 249, 228, 0) 34%),
        linear-gradient(180deg, var(--sky) 0 52%, var(--grass) 52% 78%, var(--soil) 78% 100%);
    }

    .poster {
      width: min(100%, 780px);
      background: rgba(246, 236, 212, 0.96);
      border: 6px solid #3b2817;
      box-shadow: 0 22px 46px rgba(30, 22, 16, 0.22);
      overflow: hidden;
    }

    .poster-top {
      padding: 18px 22px;
      background:
        linear-gradient(180deg, #8c8c8c 0 82%, #636363 82% 100%);
      border-bottom: 6px solid #5c3d20;
      color: #fff8eb;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: #ffd86d;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 40px;
      line-height: 1.15;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 16px;
      line-height: 1.7;
      color: #f7ecd0;
    }

    .poster-body {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 0;
    }

    .scene-panel {
      position: relative;
      min-height: 560px;
      padding: 26px 24px 24px;
      background:
        linear-gradient(180deg, #b8e0ff 0 58%, #7fc35d 58% 72%, #7b4e2a 72% 100%);
      border-right: 6px solid #5c3d20;
      overflow: hidden;
    }

    .scene-card {
      position: relative;
      max-width: 320px;
      margin: 0 auto;
      padding: 18px;
      background: rgba(246, 236, 212, 0.94);
      border: 5px solid #412a19;
      box-shadow: 10px 10px 0 rgba(30, 22, 16, 0.12);
      z-index: 1;
    }

    .scene-card img {
      display: block;
      width: 100%;
      border: 4px solid #412a19;
      background: #fff7e8;
    }

    .scene-tag {
      display: inline-block;
      margin-top: 14px;
      padding: 8px 16px;
      background: #7c4d28;
      color: #fff6df;
      border: 4px solid #4c2b12;
      font-size: 18px;
      font-weight: 700;
    }

    .scene-copy {
      margin-top: 16px;
      font-size: 15px;
      line-height: 1.8;
    }

    .cloud,
    .hill {
      position: absolute;
      opacity: 0.9;
    }

    .cloud {
      top: 28px;
      width: 58px;
      height: 18px;
      background: #fffdf4;
      box-shadow:
        18px 0 0 #fffdf4,
        36px 0 0 #fffdf4,
        9px -9px 0 #fffdf4,
        27px -9px 0 #fffdf4;
    }

    .cloud.left {
      left: 42px;
    }

    .cloud.right {
      right: 58px;
      transform: scale(0.9);
    }

    .hill {
      bottom: 138px;
      width: 120px;
      height: 60px;
      background: rgba(80, 148, 107, 0.28);
      border: 4px solid rgba(67, 100, 69, 0.32);
      clip-path: polygon(0% 100%, 20% 62%, 42% 72%, 58% 36%, 74% 58%, 100% 100%);
    }

    .hill.left {
      left: 18px;
    }

    .hill.right {
      right: 22px;
    }

    .qr-panel {
      padding: 28px 24px 24px;
      background: linear-gradient(180deg, #f6ecd4 0 86%, #e1c684 86% 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
    }

    .qr-frame {
      padding: 16px;
      background: #fffdf7;
      border: 5px solid #c5972c;
      box-shadow: inset 0 0 0 2px rgba(255, 220, 126, 0.34);
    }

    .qr-frame img {
      display: block;
      width: min(100%, 280px);
      margin: 0 auto;
    }

    .scan-title {
      font-size: 28px;
      line-height: 1.2;
      margin: 0;
      color: var(--red);
    }

    .scan-copy,
    .scan-link,
    .scan-tip {
      font-size: 15px;
      line-height: 1.8;
    }

    .scan-link {
      padding: 12px 14px;
      background: rgba(255, 250, 236, 0.88);
      border: 2px dashed #b7862a;
      word-break: break-all;
    }

    .scan-tip {
      color: #5b4734;
    }

    @media (max-width: 720px) {
      .poster-body {
        grid-template-columns: 1fr;
      }

      .scene-panel {
        border-right: none;
        border-bottom: 6px solid #5c3d20;
      }

      h1 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <main class="poster">
    <section class="poster-top">
      <p class="eyebrow">Scan To Experience</p>
      <h1>扫码体验《好戏再生》</h1>
      <p class="subtitle">进入一个把花鼓戏、远程陪伴与虚拟搭台结合起来的互动聊天空间。</p>
    </section>

    <section class="poster-body">
      <div class="scene-panel">
        <span class="cloud left"></span>
        <span class="cloud right"></span>
        <span class="hill left"></span>
        <span class="hill right"></span>

        <article class="scene-card">
          <img src="./building-cutout.png" alt="好戏再生戏台预览">
          <div class="scene-tag">好戏再生</div>
          <p class="scene-copy">从进入戏房，到一起搭虚拟戏台，再到聊天与唱和，这个网页把“远方的人”和“留守的人”重新连到了一起。</p>
        </article>
      </div>

      <div class="qr-panel">
        <div>
          <p class="eyebrow">Mobile Access</p>
          <h2 class="scan-title">手机直接扫码打开</h2>
          <p class="scan-copy">无需下载，扫码即可进入网页体验。建议使用手机浏览器打开，互动按钮与戏台搭建流程都可以直接操作。</p>
        </div>

        <div class="qr-frame">
          <img
            src="https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=https%3A%2F%2Fyabowan-h39c.vercel.app%2F%3Fv%3D20260406"
            alt="好戏再生访问二维码"
          >
        </div>

        <div class="scan-link">https://yabowan-h39c.vercel.app/?v=20260406</div>
        <div class="scan-tip">提示：如微信内打开交互异常，可点击右上角选择“在浏览器中打开”。</div>
      </div>
    </section>
  </main>
</body>
</html>
